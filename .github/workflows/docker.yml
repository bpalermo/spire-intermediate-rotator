name: build-and-push
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Image names
        id: imgs
        run: |
          echo "list=ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo "list<<EOF" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ github.repository }}" >> "$GITHUB_OUTPUT"
            echo "docker.io/${{ vars.DOCKERHUB_USERNAME }}/spire-intermediate-rotator" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgs.outputs.list }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
